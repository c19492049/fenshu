name: 郑大成绩监控

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: zzu-grade-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 检查成绩
        env:
          ZZU_ACCOUNT: ${{ secrets.ZZU_ACCOUNT }}
          ZZU_PASSWORD: ${{ secrets.ZZU_PASSWORD }}
          SEND_KEY: ${{ secrets.SEND_KEY }}
          HEADLESS: "true"
        run: python grade_monitor.py

      - name: 保存成绩和运行状态
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last_grades.json zzu_jw_state.json failure_count.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update grade monitor state [skip ci]"
            git push
          fi

      - name: 上传调试文件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            debug.png
            debug.html
